<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W budowie | Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --accent: #3b82f6;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animowane tło - kolorowe plamy */
        .background-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: move 12s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: var(--accent);
            top: -150px;
            left: -150px;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: #a855f7;
            bottom: -100px;
            right: -100px;
            animation-delay: 2s;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(60px, 120px) scale(1.1); }
        }

        /* Kontener główny (Glassmorphism) */
        .container {
            padding: 20px;
            width: 100%;
            max-width: 550px;
            z-index: 1;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 100px;
            color: var(--accent);
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 18px;
            letter-spacing: -1.5px;
            line-height: 1.1;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 35px;
            font-size: 1.05rem;
        }

        /* Formularz zapisu */
        .subscribe-form {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 14px 18px;
            border-radius: 14px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s, background 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }

        button {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 14px 24px;
            border-radius: 14px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            background: #f0f0f0;
            box-shadow: 0 10px 20px -5px rgba(255, 255, 255, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        /* Linki społecznościowe */
        .socials {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 10px;
        }

        .socials a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .socials a:hover {
            color: white;
        }

        /* Responsywność dla telefonów */
        @media (max-width: 480px) {
            .glass-card { padding: 30px 20px; }
            h1 { font-size: 2.1rem; }
            .subscribe-form { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <div class="glass-card">
            <div class="badge">W trakcie prac</div>
            <h1>Coś wielkiego <br>jest w drodze</h1>
            <p>Budujemy nowoczesną platformę dla fanów Steam. Premiera już wkrótce! Zapisz się, aby otrzymać powiadomienie.</p>
            
            <form class="subscribe-form" onsubmit="event.preventDefault(); alert('Dziękujemy za zapis!');">
                <input type="email" placeholder="Twój e-mail" required title="Wpisz poprawny adres e-mail">
                <button type="submit">Powiadom mnie</button>
            </form>

            <div class="socials">
                <a href="#">GitHub</a>
                <a href="#">X (Twitter)</a>
                <a href="#">Discord</a>
            </div>
        </div>
    </main>

</body>
</html>
