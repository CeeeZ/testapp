<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W budowie | Coming Soon</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <div class="glass-card">
            <div class="badge">Wkrótce otwarcie</div>
            <h1>Coś wyjątkowego jest w drodze</h1>
            <p>Pracujemy nad nowym projektem. Nasza strona jest aktualnie w trakcie budowy. Zostaw swój e-mail, aby otrzymać powiadomienie o starcie!</p>
            
            <form class="subscribe-form">
                <input type="email" placeholder="Twój adres e-mail" required>
                <button type="submit">Powiadom mnie</button>
            </form>

            <div class="socials">
                <a href="#">GitHub</a>
                <a href="#">Twitter</a>
                <a href="#">Instagram</a>
            </div>
        </div>
    </main>
</body>
</html>
